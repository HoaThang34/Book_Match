<!-- Ambient Background Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary rounded-full blur-[120px] opacity-10 pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center w-full max-w-[720px] px-margin-mobile">
<!-- Top Status Indicator -->
<div class="mb-lg flex items-center gap-xs text-primary bg-primary/10 px-md py-xs rounded-full border border-primary/20 backdrop-blur-md">
<span class="material-symbols-outlined text-[18px]">psychology</span>
<span class="font-label-lg text-label-lg uppercase tracking-wider">Deep Focus Mode</span>
</div>
<!-- Circular Timer -->
<div class="relative w-72 h-72 md:w-80 md:h-80 flex items-center justify-center mb-xl">
<!-- SVG Rings -->
<svg class="absolute inset-0 w-full h-full transform -rotate-90" viewBox="0 0 320 320">
<!-- Inactive Track -->
<circle class="text-surface-container-highest" cx="160" cy="160" fill="transparent" r="148" stroke="currentColor" stroke-width="6"></circle>
<!-- Active Track (Ignite Orange) -->
<!-- stroke-dasharray = 2 * PI * r = 2 * 3.14159 * 148 ≈ 930 -->
<!-- stroke-dashoffset dictates progress. Set to ~1/4 complete for visual interest -->
<circle class="text-primary-container timer-glow transition-all duration-1000 ease-linear" cx="160" cy="160" fill="transparent" r="148" stroke="currentColor" stroke-dasharray="930" stroke-dashoffset="200" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<!-- Inner Content -->
<div class="z-10 flex flex-col items-center">
<span class="font-display-lg text-display-lg text-on-surface tracking-tighter tabular-nums">15:00</span>
</div>
</div>

        </button>

<script>
    const menuBtn = document.getElementById('menuBtn');
    const closeMenuBtn = document.getElementById('closeMenuBtn');
    const navDrawer = document.getElementById('navDrawer');
    const navBackdrop = document.getElementById('navBackdrop');
    const navContent = document.getElementById('navContent');

    function openMenu() {
        navDrawer.classList.remove('hidden');
        void navDrawer.offsetWidth;
        navBackdrop.classList.remove('opacity-0');
        navContent.classList.remove('-translate-x-full');
    }

    function closeMenu() {
        navBackdrop.classList.add('opacity-0');
        navContent.classList.add('-translate-x-full');
        setTimeout(() => {
            navDrawer.classList.add('hidden');
        }, 300);
    }

    if (menuBtn) menuBtn.addEventListener('click', openMenu);
    if (closeMenuBtn) closeMenuBtn.addEventListener('click', closeMenu);
    if (navBackdrop) navBackdrop.addEventListener('click', closeMenu);
</script>
