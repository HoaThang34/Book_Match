<body class="bg-background min-h-screen flex flex-col items-center justify-center relative overflow-hidden pt-32 md:pt-20 pb-24">
<!-- TopAppBar -->
<header class="bg-background/95 fixed top-0 w-full z-50 backdrop-blur-md border-b border-outline-variant/10">
<div class="flex flex-col md:flex-row items-center justify-between md:px-margin-mobile w-full max-w-[1200px] mx-auto relative">
    <div class="flex items-center justify-between w-full h-16 px-4 md:px-0">
        <h1 class="font-display font-bold text-xl text-primary">AI Reader</h1>
        
        <div class="flex items-center gap-3">
            <div onclick="window.location.href='streak.html'" class="flex items-center gap-2 bg-primary/10 px-3 py-1.5 rounded-full border border-primary/20 cursor-pointer hover:bg-primary/20 transition-colors">
                <span class="text-sm font-semibold text-primary">5 Days</span>
                <span class="text-sm">✨</span>
            </div>
            <!-- Profile Avatar -->
            <div onclick="window.location.href='login.html'" class="flex w-9 h-9 rounded-full bg-surface-variant border border-outline-variant items-center justify-center cursor-pointer hover:bg-surface-container transition-colors" title="Đăng xuất">
                <span class="material-symbols-outlined text-[20px] text-on-surface-variant">person</span>
            </div>
        </div>
    </div>
    
    <!-- Navigation -->
    <nav class="flex md:absolute md:left-1/2 md:transform md:-translate-x-1/2 items-center gap-1 md:gap-2 w-full md:w-auto overflow-x-auto no-scrollbar pb-2 md:pb-0 px-4 md:px-0">
        <a href="home.html" class="flex items-center gap-2 text-on-surface-variant hover:text-primary hover:bg-surface-container transition-colors px-3 md:px-4 py-2 rounded-full whitespace-nowrap">
            <span class="material-symbols-outlined text-[20px]">home</span>

        </a>
        <a href="mission.html" class="flex items-center gap-2 text-on-surface-variant hover:text-primary hover:bg-surface-container transition-colors px-3 md:px-4 py-2 rounded-full whitespace-nowrap">
            <span class="material-symbols-outlined text-[20px]">search</span>
            <span class="font-label-lg">Khám phá</span>
        </a>
        <a href="timer.html" class="flex items-center gap-2 text-primary font-bold px-3 md:px-4 py-2 rounded-full bg-primary/10 transition-colors whitespace-nowrap">
            <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">timer</span>
            <span class="font-label-lg">Focus</span>
        </a>
        <a href="streak.html" class="flex items-center gap-2 text-on-surface-variant hover:text-primary hover:bg-surface-container transition-colors px-3 md:px-4 py-2 rounded-full whitespace-nowrap">

        </a>

</header>
<!-- Ambient Background Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary rounded-full blur-[120px] opacity-10 pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center w-full max-w-[720px] px-margin-mobile">
<!-- Top Status Indicator -->
<div class="mb-lg flex items-center gap-xs text-primary bg-primary/10 px-md py-xs rounded-full border border-primary/20 backdrop-blur-md">
<span class="material-symbols-outlined text-[18px]">psychology</span>
<span class="font-label-lg text-label-lg uppercase tracking-wider">Deep Focus Mode</span>
</div>
<!-- Circular Timer -->
<div class="relative w-72 h-72 md:w-[400px] md:h-[400px] lg:w-[480px] lg:h-[480px] flex items-center justify-center mb-xl">
<!-- SVG Rings -->
<svg class="absolute inset-0 w-full h-full transform -rotate-90" viewBox="0 0 320 320">
<!-- Inactive Track -->
<circle class="text-surface-container-highest" cx="160" cy="160" fill="transparent" r="148" stroke="currentColor" stroke-width="6"></circle>
<!-- Active Track (Ignite Orange) -->
<!-- stroke-dasharray = 2 * PI * r = 2 * 3.14159 * 148 ≈ 930 -->
<!-- stroke-dashoffset dictates progress. Set to ~1/4 complete for visual interest -->
<circle class="text-primary-container timer-glow transition-all duration-1000 ease-linear" cx="160" cy="160" fill="transparent" r="148" stroke="currentColor" stroke-dasharray="930" stroke-dashoffset="200" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<!-- Inner Content -->
<div class="z-10 flex flex-col items-center">
<span class="font-display-lg text-display-lg md:text-[80px] lg:text-[96px] text-on-surface tracking-tighter tabular-nums font-bold md:leading-none">15:00</span>
</div>
</div>
<!-- Primary Action -->
<button class="bg-primary-container text-on-primary-container font-label-lg text-label-lg md:text-[18px] uppercase tracking-wider px-xl py-sm md:px-[64px] md:py-[18px] rounded-full shadow-[0_0_25px_rgba(255,107,0,0.25)] hover:shadow-[0_0_35px_rgba(255,107,0,0.4)] hover:bg-primary transition-all active:scale-95 flex items-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
            Bắt đầu hẹn giờ
        </button>
</main>
