<!DOCTYPE html>
<html lang="vi" style="">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Đăng nhập - AI Reader</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Montserrat:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#ffb693",
                        "error-container": "#ffdad6",
                        "background": "#f9f9ff",
                        "surface-container-low": "#f0f3ff",
                        "on-primary-container": "#572000",
                        "primary-fixed-dim": "#ffb693",
                        "on-secondary-fixed-variant": "#4500d8",
                        "surface-bright": "#f9f9ff",
                        "secondary": "#4000cc",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#d8e3fb",
                        "on-background": "#111c2d",
                        "secondary-fixed": "#e5deff",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#351000",
                        "on-primary-fixed-variant": "#7a3000",
                        "on-surface-variant": "#5a4136",
                        "surface-container": "#e7eeff",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#75d1ff",
                        "secondary-fixed-dim": "#c9bfff",
                        "on-tertiary-fixed": "#001e2b",
                        "outline-variant": "#e2bfb0",
                        "tertiary-fixed": "#c2e8ff",
                        "secondary-container": "#581cff",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#1b0063",
                        "surface-container-high": "#dee8ff",
                        "inverse-on-surface": "#ecf1ff",
                        "tertiary-container": "#00a5d9",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#003649",
                        "surface-variant": "#d8e3fb",
                        "on-secondary-container": "#d4cbff",
                        "primary": "#a04100",
                        "primary-container": "#ff6b00",
                        "on-tertiary-fixed-variant": "#004d67",
                        "surface-tint": "#a04100",
                        "inverse-surface": "#263143",
                        "outline": "#8e7164",
                        "tertiary": "#006688",
                        "surface": "#f9f9ff",
                        "on-secondary": "#ffffff",
                        "on-surface": "#111c2d",
                        "surface-dim": "#cfdaf2",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#ffdbcc"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "12px",
                        "lg": "40px",
                        "xs": "4px",
                        "margin-desktop": "48px",
                        "base": "8px",
                        "md": "24px",
                        "xl": "64px",
                        "margin-mobile": "16px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "body-md": [
                            "Montserrat"
                        ],
                        "label-lg": [
                            "Montserrat"
                        ],
                        "headline-lg": [
                            "Montserrat"
                        ],
                        "headline-md": [
                            "Montserrat"
                        ],
                        "label-sm": [
                            "Montserrat"
                        ],
                        "headline-lg-mobile": [
                            "Montserrat"
                        ],
                        "display-lg": [
                            "Montserrat"
                        ],
                        "body-lg": [
                            "Montserrat"
                        ]
                    },
                    "fontSize": {
                        "body-md": [
                            "16px",
                            {
                                "lineHeight": "24px",
                                "fontWeight": "400"
                            }
                        ],
                        "label-lg": [
                            "14px",
                            {
                                "lineHeight": "20px",
                                "letterSpacing": "0.01em",
                                "fontWeight": "600"
                            }
                        ],
                        "headline-lg": [
                            "32px",
                            {
                                "lineHeight": "40px",
                                "fontWeight": "700"
                            }
                        ],
                        "headline-md": [
                            "24px",
                            {
                                "lineHeight": "32px",
                                "fontWeight": "600"
                            }
                        ],
                        "label-sm": [
                            "12px",
                            {
                                "lineHeight": "16px",
                                "fontWeight": "500"
                            }
                        ],
                        "headline-lg-mobile": [
                            "28px",
                            {
                                "lineHeight": "34px",
                                "fontWeight": "700"
                            }
                        ],
                        "display-lg": [
                            "48px",
                            {
                                "lineHeight": "56px",
                                "letterSpacing": "-0.02em",
                                "fontWeight": "700"
                            }
                        ],
                        "body-lg": [
                            "18px",
                            {
                                "lineHeight": "28px",
                                "fontWeight": "400"
                            }
                        ]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style data-stitch-cursor="">
        * {
            cursor: crosshair !important
        }

        [contenteditable="true"]:focus,
        .cursor-text:focus {
            cursor: text !important
        }
    </style>
    <style data-stitch-scroll-lock="">
        html,
        body {
            overflow: hidden !important
        }
    </style>
</head>

<body
    class="bg-background text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden font-body-md">
    <!-- Background Ambient Glow Effects -->
    <div
        class="absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] bg-primary-container rounded-full blur-[120px] opacity-20 pointer-events-none">
    </div>
    <div
        class="absolute bottom-[-10%] right-[-20%] w-[50vw] h-[50vw] bg-secondary-container/10 rounded-full blur-[100px] opacity-30 pointer-events-none">
    </div>
    <main class="w-full max-w-[420px] px-margin-mobile z-10 flex flex-col">
        <!-- Header / Identity -->
        <div class="flex flex-col mb-xl">
            <div
                class="w-16 h-16 rounded-xl bg-surface-container-lowest border border-outline-variant/30 flex items-center justify-center shadow-[0_4px_30px_rgba(0,0,0,0.05)] mb-md">
                <span class="material-symbols-outlined text-secondary text-[32px]"
                    style="font-variation-settings: &quot;FILL&quot; 1;">menu_book</span>
            </div>
            <h1 class="font-display-lg text-display-lg text-on-surface">Chào mừng<br><span class="text-secondary">trở
                    lại</span></h1>
        </div>
        <!-- Form Section -->
        <form class="flex flex-col gap-md w-full">
            <!-- Email Input -->
            <div class="flex flex-col gap-xs group">
                <label class="font-label-lg text-label-lg text-on-surface-variant uppercase ml-1"
                    for="email">Email</label>
                <div class="relative flex items-center">
                    <span
                        class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-secondary transition-colors">mail</span>
                    <input
                        class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-4 pl-12 pr-4 font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all"
                        id="email" placeholder="email@example.com" type="email">
                </div>
            </div>
            <!-- Password Input -->
            <div class="flex flex-col gap-xs group">
                <label class="font-label-lg text-label-lg text-on-surface-variant uppercase ml-1" for="password">Mật
                    khẩu</label>
                <div class="relative flex items-center">
                    <span
                        class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-secondary transition-colors">lock</span>
                    <input
                        class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-4 pl-12 pr-12 font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all"
                        id="password" placeholder="••••••••" type="password">
                    <button
                        class="absolute right-4 text-outline hover:text-on-surface transition-colors focus:outline-none"
                        type="button">
                        <span class="material-symbols-outlined">visibility_off</span>
                    </button>
                </div>
            </div>
            <!-- Actions Row -->
            <div class="flex justify-end mt-[-8px]">
                <a class="font-label-lg text-label-lg text-primary hover:text-primary-container transition-colors"
                    href="#">Quên mật khẩu?</a>
            </div>
            <!-- Submit Button -->
            <button
                class="w-full bg-primary-container text-white font-label-lg text-label-lg uppercase tracking-wider py-4 rounded-full mt-sm hover:bg-primary transition-colors shadow-[0_4px_20px_rgba(255,107,0,0.25)] active:scale-[0.98]"
                type="submit">
                Đăng nhập
            </button>
        </form>
        <!-- Divider -->
        <div class="flex items-center gap-4 my-lg">
            <div class="flex-1 h-[1px] bg-outline-variant/50"></div>
            <span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider text-[11px]">Hoặc
                tiếp tục với</span>
            <div class="flex-1 h-[1px] bg-outline-variant/50"></div>
        </div>
        <!-- Social Login -->
        <div class="grid grid-cols-2 gap-sm">
            <button
                class="flex items-center justify-center gap-base py-3 border border-outline-variant rounded-lg bg-surface-container-lowest hover:bg-surface-container-low transition-colors group"
                type="button">
                <span
                    class="material-symbols-outlined text-[20px] text-on-surface group-hover:text-primary transition-colors">language</span>
                <span class="font-label-lg text-label-lg text-on-surface">Google</span>
            </button>
            <button
                class="flex items-center justify-center gap-base py-3 border border-outline-variant rounded-lg bg-surface-container-lowest hover:bg-surface-container-low transition-colors group"
                type="button">
                <span
                    class="material-symbols-outlined text-[20px] text-on-surface group-hover:text-primary transition-colors">smartphone</span>
                <span class="font-label-lg text-label-lg text-on-surface">Apple</span>
            </button>
        </div>
        <!-- Sign Up Link -->
        <div class="text-center mt-xl">
            <p class="font-body-md text-body-md text-on-surface-variant">
                Chưa có tài khoản?
                <a class="font-label-lg text-label-lg text-secondary hover:text-secondary-container transition-colors ml-1"
                    href="#">Đăng ký ngay</a>
            </p>
        </div>
    </main>


</body>

</html>
