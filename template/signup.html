            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

    body {

<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-x-hidden antialiased"><nav class="fixed top-0 left-0 right-0 h-16 bg-surface/80 backdrop-blur-md border-b border-outline-variant z-50 px-margin-mobile md:px-margin-desktop flex items-center justify-between">
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 rounded-lg bg-primary-container flex items-center justify-center">
      <span class="material-symbols-outlined text-white text-[18px]">menu_book</span>
    </div>
    <span class="font-display text-lg font-bold text-on-surface">AI Reader</span>
  </div>
  <div class="flex items-center gap-4">
    <a href="#" class="font-label-lg text-primary hover:text-on-primary-container transition-colors">Đăng nhập</a>
  </div>
</nav>
<!-- Ambient Background Glow -->
<div class="fixed top-[-10%] left-[-10%] w-[120%] h-[120%] pointer-events-none z-0" style="background: radial-gradient(circle at 50% 0%, rgba(255, 107, 0, 0.1) 0%, rgba(249, 249, 255, 1) 60%);"></div>
<!-- Main Content Canvas (Transactional Screen - No Navigation Shell) -->
<main class="w-full max-w-[480px] z-10 px-margin-mobile py-xl flex flex-col gap-lg mt-16">
<!-- Header Section -->
<header class="flex flex-col items-center text-center gap-sm">
<div class="w-16 h-16 rounded-2xl bg-primary-container flex items-center justify-center shadow-lg mb-2"><span class="material-symbols-outlined text-[32px] text-white" style="font-variation-settings: &quot;FILL&quot; 1;">menu_book</span></div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Bắt đầu hành trình</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Tham gia hành trình tri thức với AI Reader.</p>
</header>
<!-- Sign Up Form -->
<form class="flex flex-col gap-md w-full bg-surface/80 backdrop-blur-xl p-6 rounded-2xl border border-black/5 shadow-[0_10px_40px_rgba(0,0,0,0.05)]">
<!-- Full Name Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase">Họ và tên</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary-container transition-colors">person</span>
<input class="w-full bg-surface-container-lowest border border-outline rounded-xl py-3 pl-12 pr-4 text-on-surface font-body-md text-body-md placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" placeholder="Nguyễn Văn A" type="text">
</div>
</div>
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase">Địa chỉ Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary-container transition-colors">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline rounded-xl py-3 pl-12 pr-4 text-on-surface font-body-md text-body-md placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" placeholder="email@example.com" type="email">
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase">Mật khẩu của bạn</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary-container transition-colors">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline rounded-xl py-3 pl-12 pr-4 text-on-surface font-body-md text-body-md placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" placeholder="••••••••" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase">Xác nhận lại mật khẩu</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary-container transition-colors">lock_reset</span>
<input class="w-full bg-surface-container-lowest border border-outline rounded-xl py-3 pl-12 pr-4 text-on-surface font-body-md text-body-md placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" placeholder="••••••••" type="password">
</div>
</div>
<!-- Primary Action Button -->
<button class="mt-4 w-full bg-primary-container text-[#ffffff] font-label-md text-label-md uppercase tracking-wide py-4 rounded-xl shadow-[0_4px_20px_rgba(255,107,0,0.25)] hover:shadow-[0_6px_25px_rgba(255,107,0,0.4)] active:scale-[0.98] transition-all flex justify-center items-center gap-2" type="button">Tạo tài khoản mới <span class="material-symbols-outlined text-[18px]">arrow_forward</span></button>
</form>
<!-- Social Sign Up -->
<div class="flex flex-col gap-4 w-full">
<div class="flex items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant"></div>
<span class="font-label-md text-label-md text-on-surface-variant uppercase text-[10px]">Hoặc tiếp tục với</span>
<div class="h-[1px] flex-1 bg-outline-variant"></div>
</div>
<div class="flex gap-4">
<button class="flex-1 flex justify-center items-center py-3 border border-outline-variant rounded-xl bg-surface-container-lowest hover:bg-surface-container transition-colors" type="button">
<!-- Placeholder for Google Icon using Material Symbol for structure, but usually an SVG -->
<span class="material-symbols-outlined text-on-surface">account_circle</span>
</button>
<button class="flex-1 flex justify-center items-center py-3 border border-outline-variant rounded-xl bg-surface-container-lowest hover:bg-surface-container transition-colors" type="button">
<span class="material-symbols-outlined text-on-surface">ios</span>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="text-center mt-4">
<p class="font-body-md text-body-md text-on-surface-variant">
                Đã có tài khoản?
